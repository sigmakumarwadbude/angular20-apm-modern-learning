<div class="space-y-8">

  <!-- Hero -->

  <section
    class="
      bg-gradient-to-r
      from-blue-600
      to-indigo-600
      rounded-xl
      p-8
      text-white
    "
  >
    <h1 class="text-4xl font-bold">
      {{pageTtitle}}
    </h1>

    <p class="mt-3 text-blue-100">
      {{pageSubTitle}}
    </p>
  </section>

  <!-- Stats -->

  <section>

    <h2 class="text-xl font-semibold mb-4">
      Overview
    </h2>

    <div
      class="
        grid
        grid-cols-1
        md:grid-cols-2
        lg:grid-cols-4
        gap-6
      "
    >
      @for(stat of stats(); track stat.title){

        <app-dashboard-card
          [title]="stat.title"
          [value]="stat.value"
        />

      }
    </div>

  </section>

  <!-- Quick Actions -->

  <section>

    <h2 class="text-xl font-semibold mb-4">
      Quick Actions
    </h2>

    <div class="grid md:grid-cols-3 gap-4">

      <app-quick-action
        label="Products"
        route="/products"
      />

      <app-quick-action
        label="Create Product"
        route="/products/new"
      />

      <app-quick-action
        label="Reports"
        route="/reports"
      />

    </div>

  </section>

</div>
